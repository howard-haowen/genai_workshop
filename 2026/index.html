<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>2026 AI創造工作坊</title>
        <meta name="description" content="2026 AI創造工作坊課程材料入口。" />
        <style>
            :root {
                color-scheme: light dark;
                --bg: #f7f4ff;
                --panel: #ffffff;
                --text: #1f2330;
                --muted: #5f6680;
                --brand: #6f48ff;
                --brand-2: #0ea5e9;
                --line: rgba(31, 35, 48, 0.12);
                --shadow: 0 18px 48px rgba(61, 44, 130, 0.16);
                --radius: 22px;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #11131f;
                    --panel: #1a1d2b;
                    --text: #f2f5ff;
                    --muted: #b8bed4;
                    --line: rgba(242, 245, 255, 0.14);
                    --shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
                }
            }

            * { box-sizing: border-box; }
            body {
                margin: 0;
                min-height: 100vh;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
                line-height: 1.65;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(111, 72, 255, 0.24), transparent 34rem),
                    radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.18), transparent 30rem),
                    var(--bg);
            }
            a { color: inherit; }
            .wrap { width: min(980px, calc(100% - 40px)); margin: 0 auto; padding: 72px 0; }
            .hero, .card {
                border: 1px solid var(--line);
                border-radius: var(--radius);
                background: var(--panel);
                box-shadow: var(--shadow);
            }
            .hero { padding: 42px; border-radius: calc(var(--radius) + 10px); }
            .eyebrow {
                display: inline-flex;
                padding: 6px 12px;
                border-radius: 999px;
                color: #fff;
                background: linear-gradient(135deg, var(--brand), var(--brand-2));
                font-size: 0.92rem;
                font-weight: 700;
            }
            h1 { margin: 18px 0 12px; font-size: clamp(2.25rem, 6vw, 4.75rem); line-height: 1.08; letter-spacing: -0.05em; }
            .subtitle { max-width: 760px; margin: 0; color: var(--muted); font-size: clamp(1.05rem, 2vw, 1.28rem); }
            .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-top: 28px; }
            .card { padding: 22px; }
            .card h2 { margin: 0 0 8px; font-size: 1.2rem; }
            .card p { margin: 0; color: var(--muted); }
            .back { display: inline-flex; margin-top: 24px; color: var(--brand); font-weight: 800; text-decoration: none; }
            footer { margin-top: 42px; color: var(--muted); text-align: center; font-size: 0.95rem; }
            @media (max-width: 760px) { .wrap { padding-top: 36px; } .hero { padding: 28px; } .cards { grid-template-columns: 1fr; } }
        </style>
    </head>
    <body>
        <main class="wrap">
            <section class="hero" aria-labelledby="page-title">
                <span class="eyebrow">2026 工作坊</span>
                <h1 id="page-title">AI創造工作坊</h1>
                <p class="subtitle">今年度課程材料入口。新的投影片、教材與應用程式可以依照課程進度逐步加入此資料夾並發布到 GitHub Pages。</p>
                <div class="cards" aria-label="2026 課程材料狀態">
                    <article class="card">
                        <h2>年度材料建置中</h2>
                        <p>請將今年度的 Marp 投影片、講義與範例應用程式新增到 `workshops/2026/`。</p>
                    </article>
                    <article class="card">
                        <h2>獨立年度網址</h2>
                        <p>此頁會發布到 `/genai_workshop/2026/`，不會覆蓋 2025 年度內容。</p>
                    </article>
                </div>
                <a class="back" href="../">← 回年度入口</a>
            </section>
            <footer>
                <p>新的年度可以從這裡開始，保留舊內容，也讓今年的材料有自己的空間。</p>
            </footer>
        </main>
    </body>
</html>
