name: Deploy All

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: |
          mkdir -p build
          chmod 777 build

      - name: Copy root landing page
        run: cp index.html build/index.html

      - name: Build versioned workshop pages
        run: |
          for year_dir in workshops/*; do
            [ -d "$year_dir" ] || continue
            year="$(basename "$year_dir")"
            mkdir -p "build/$year"
            chmod 777 "build/$year"

            if [ -f "$year_dir/index.html" ]; then
              cp "$year_dir/index.html" "build/$year/index.html"
            fi

            if [ -d "$year_dir/flash-cards" ]; then
              mkdir -p "build/$year/apps"
              chmod 777 "build/$year/apps"
              cp -r "$year_dir/flash-cards/." "build/$year/apps/"
            fi

            for file in "$year_dir"/*_marp.md; do
              [ -e "$file" ] || continue
              base="$(basename "${file%.*}")"
              docker run --rm -u root:root \
                -v "$PWD:/home/marp/app" \
                marpteam/marp-cli:latest \
                "$file" --html -o "/home/marp/app/build/$year/${base}.html"
            done
          done

      - name: Deploy preview (PRs)
        if: ${{ github.event_name == 'pull_request' }}
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build/
          preview-branch: gh-pages
          umbrella-dir: pr-preview

      - name: Deploy to GitHub Pages (main branch)
        if: ${{ github.event_name == 'push' }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
