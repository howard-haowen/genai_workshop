<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>AI創造工作坊</title>
        <meta name="description" content="AI創造工作坊年度入口：瀏覽 2025 與 2026 年度課程材料。" />
        <style>
            :root {
                color-scheme: light dark;
                --bg: #f7f4ff;
                --panel: #ffffff;
                --text: #1f2330;
                --muted: #5f6680;
                --brand: #6f48ff;
                --brand-2: #0ea5e9;
                --line: rgba(31, 35, 48, 0.12);
                --shadow: 0 18px 48px rgba(61, 44, 130, 0.16);
                --radius: 22px;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #11131f;
                    --panel: #1a1d2b;
                    --text: #f2f5ff;
                    --muted: #b8bed4;
                    --line: rgba(242, 245, 255, 0.14);
                    --shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
                }
            }

            * { box-sizing: border-box; }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
                line-height: 1.65;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(111, 72, 255, 0.24), transparent 34rem),
                    radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.18), transparent 30rem),
                    var(--bg);
            }

            a { color: inherit; }

            .github-button {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 10;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                min-height: 42px;
                padding: 9px 14px;
                border: 1px solid var(--line);
                border-radius: 999px;
                color: var(--text);
                background: color-mix(in srgb, var(--panel) 86%, transparent);
                box-shadow: 0 10px 24px rgba(61, 44, 130, 0.12);
                text-decoration: none;
                font-weight: 800;
                backdrop-filter: blur(14px);
            }

            .github-button svg { width: 20px; height: 20px; }

            .wrap {
                width: min(980px, calc(100% - 40px));
                margin: 0 auto;
                padding: 72px 0;
            }

            .hero {
                padding: 42px;
                border: 1px solid var(--line);
                border-radius: calc(var(--radius) + 10px);
                background: linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.38));
                box-shadow: var(--shadow);
                backdrop-filter: blur(18px);
            }

            @media (prefers-color-scheme: dark) {
                .hero { background: linear-gradient(135deg, rgba(26, 29, 43, 0.88), rgba(26, 29, 43, 0.62)); }
            }

            .eyebrow {
                display: inline-flex;
                width: fit-content;
                padding: 6px 12px;
                border-radius: 999px;
                color: #fff;
                background: linear-gradient(135deg, var(--brand), var(--brand-2));
                font-size: 0.92rem;
                font-weight: 700;
                letter-spacing: 0.04em;
            }

            h1 {
                margin: 18px 0 12px;
                font-size: clamp(2.25rem, 6vw, 4.75rem);
                line-height: 1.08;
                letter-spacing: -0.05em;
            }

            .subtitle {
                max-width: 760px;
                margin: 0;
                color: var(--muted);
                font-size: clamp(1.05rem, 2vw, 1.28rem);
            }

            .years {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
                margin-top: 28px;
            }

            .year-card {
                display: block;
                padding: 24px;
                border: 1px solid var(--line);
                border-radius: var(--radius);
                background: var(--panel);
                box-shadow: 0 10px 28px rgba(61, 44, 130, 0.08);
                text-decoration: none;
                transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
            }

            .year-card:hover {
                transform: translateY(-2px);
                border-color: rgba(111, 72, 255, 0.5);
                box-shadow: 0 12px 28px rgba(111, 72, 255, 0.18);
            }

            .year-card strong {
                display: block;
                margin-bottom: 8px;
                font-size: 1.4rem;
            }

            .year-card span { color: var(--muted); }

            footer {
                margin-top: 42px;
                color: var(--muted);
                text-align: center;
                font-size: 0.95rem;
            }

            @media (max-width: 760px) {
                .github-button {
                    position: static;
                    margin: 20px 20px 0 auto;
                    width: fit-content;
                }

                .wrap { padding-top: 36px; }
                .hero { padding: 28px; }
                .years { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body>
        <a class="github-button" href="https://github.com/howard-haowen/genai_workshop" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 查看 AI創造工作坊原始碼">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
            </svg>
            GitHub
        </a>
        <main class="wrap">
            <section class="hero" aria-labelledby="page-title">
                <span class="eyebrow">🤖 AI × 人文 × 數位創作</span>
                <h1 id="page-title">AI創造工作坊</h1>
                <p class="subtitle">請選擇年度進入課程材料。每一年度都有獨立的投影片、教材與應用程式，避免新舊內容互相覆蓋。</p>
                <div class="years" aria-label="年度課程入口">
                    <a class="year-card" href="2025/">
                        <strong>2025 工作坊</strong>
                        <span>去年度課程封存版：Markdown、Git/GitHub、Copilot、GitHub Pages 與 GitHub Actions。</span>
                    </a>
                    <a class="year-card" href="2026/">
                        <strong>2026 工作坊</strong>
                        <span>今年度課程材料入口；新內容可在此逐步新增與發布。</span>
                    </a>
                </div>
            </section>
            <footer>
                <p>讓想法從筆記、版本、原型到發布，一步一步成為可以分享的作品。</p>
            </footer>
        </main>
    </body>
</html>
